[www]
user  = www-data
group = www-data
listen = 127.0.0.1:9000

pm = dynamic
pm.max_children  = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5

; Pass all container env vars through to PHP workers
clear_env = no

php_admin_flag[log_errors] = on
php_admin_value[error_log] = /dev/stderr
